{% extends "base.html" %}

{% block title %}Eliminar ruta - Rutas del Trifinio{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Eliminar ruta</h2>
    <p>Confirma la accion antes de continuar</p>
</div>

<section class="content-panel form-panel">
    <p class="mb-4">Deseas eliminar la ruta <strong>{{ ruta.origen }} - {{ ruta.destino }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2 justify-content-end">
            <a href="{% url 'rutas_list' %}" class="btn btn-outline-secondary">Cancelar</a>
            <button type="submit" class="btn btn-danger">Eliminar</button>
        </div>
    </form>
</section>
{% endblock %}
