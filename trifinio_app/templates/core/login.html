{% extends "base.html" %}

{% block title %}Login - Rutas del Trifinio{% endblock %}

{% block public_content %}
<main class="login-page">
    <section class="login-card">
        <div class="login-brand">
            <div class="brand-icon mx-auto">RT</div>
            <h1>Rutas del Trifinio</h1>
            <p>Ingreso al sistema</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}" role="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-3">
                <label for="correo" class="form-label">Correo</label>
                <input type="email" class="form-control" id="correo" name="correo" required autofocus>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Ingresar</button>
        </form>
    </section>
</main>
{% endblock %}
